<!-- src/app/components/chat/chat.component.html -->
<div class="chat-container">
  <div class="header">
    <div class="admin-icon" (click)="navigateToAdmin()" title="Acesso Administrativo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd"
          d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z"
          clip-rule="evenodd" />
      </svg>
    </div>

    <div class="header-title">
      <h2>E.L.O. (O Piá-bot)</h2>
    <span>Canal de Apoio pedagógico e estudantil do IFPR - Campus Assis Chateaubriand</span>
    </div>
  </div>

  <!-- NOVO CONTROLE DE MODELO -->
  <div class="model-selector">
    <label for="model_select">Modelo de IA:</label>
    <select id="model_select" [(ngModel)]="selectedModel" (ngModelChange)="onModelChange()" class="model-select">
      <option *ngFor="let model of availableModels" [value]="model.modelId">
        {{ model.name }}
      </option>
    </select>
    <div class="model-info">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="info-icon">
        <path fill-rule="evenodd" d="M2.25 12c0-6.15 5.07-11.25 11.25-11.25S24.75 5.85 24.75 12c0 6.15-5.07 11.25-11.25 11.25S2.25 18.15 2.25 12zm8.706-3.75a.75.75 0 11-1.5 0 .75.75 0 011.5 0zM9.75 9a.75.75 0 000 1.5h.008a.75.75 0 000-1.5H9.75zm.375 5.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0z" clip-rule="evenodd" />
      </svg>
      <span class="tooltip">Trocar de modelo pode ajudar<br/>a evitar limites de requisições</span>
    </div>
  </div>

  <!-- CONTROLE DE TEMPERATURA -->
  <div class="temperature-control">
    <label for="piabot_temperature">Tom da Conversa:</label>
    <span class="temp-label">Descontraído</span>
    <input type="range" id="piabot_temperature" min="0" max="1" step="0.1" [(ngModel)]="chatTemperature"
      (ngModelChange)="onTemperatureChange()">
    <span class="temp-label">Formal</span>
  </div>

  <!-- ENVOLVA O COMPONENTE AQUI -->
  <div class="messages-area" #messagesArea>
    <app-message-list [messages]="messages"></app-message-list>
  </div>

  <div class="input-area">
    <app-message-input (sendMessage)="handleSendMessage($event)"></app-message-input>
  </div>

</div>
